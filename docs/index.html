<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster AR PNG Sequence</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

#container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#btn {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  z-index: 2147483647;
  font-size: 20px;
  padding: 18px 16px;
  border: 0;
  border-radius: 12px;
  touch-action: manipulation;
}

#info {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 76px;
  padding: 10px 12px;
  color: #fff;
  background: rgba(0,0,0,0.65);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  z-index: 2147483646;
  white-space: pre-wrap;
}

#ver {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 8px;
  background: rgba(255,255,0,0.9);
  color: #000;
  font-family: sans-serif;
  font-size: 12px;
  z-index: 2147483647;
  pointer-events: none;
}

canvas, video {
  pointer-events: none !important;
}
</style>
</head>

<body>
  <div id="container"></div>
  <div id="ver">PNG SEQ 01</div>
  <div id="info">Tap Start Camera.</div>
  <button id="btn" type="button">Start Camera</button>

<script>
const btn = document.getElementById("btn");
const info = document.getElementById("info");
const container = document.getElementById("container");
let started = false;

async function startAR() {
  if (started) return;
  started = true;

  btn.disabled = true;
  btn.textContent = "Loading...";
  info.textContent = "Loading AR libraries...";

  try {
    const mindarMod = await import("https://esm.sh/mind-ar@1.2.5/dist/mindar-image-three.prod.js?deps=three@0.150.0");
    const THREE = await import("https://esm.sh/three@0.150.0");
    const MindARThree = mindarMod.MindARThree;

    btn.textContent = "Starting...";
    info.textContent = "Requesting camera permission...";

    const mindarThree = new MindARThree({
      container,
      imageTargetSrc: "./targets.mind"
    });

    const { renderer, scene, camera } = mindarThree;
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

    const anchor0 = mindarThree.addAnchor(0);

    const loader = new THREE.TextureLoader();

const framePaths = [
  "./p1_anim1_frames/p1_anim1_000.png",
  "./p1_anim1_frames/p1_anim1_001.png",
  "./p1_anim1_frames/p1_anim1_002.png",
  "./p1_anim1_frames/p1_anim1_003.png",
  "./p1_anim1_frames/p1_anim1_004.png",
  "./p1_anim1_frames/p1_anim1_005.png",
  "./p1_anim1_frames/p1_anim1_006.png",
  "./p1_anim1_frames/p1_anim1_007.png",
  "./p1_anim1_frames/p1_anim1_008.png",
  "./p1_anim1_frames/p1_anim1_009.png",
  "./p1_anim1_frames/p1_anim1_010.png",
  "./p1_anim1_frames/p1_anim1_011.png",
  "./p1_anim1_frames/p1_anim1_012.png",
  "./p1_anim1_frames/p1_anim1_013.png",
  "./p1_anim1_frames/p1_anim1_014.png",
  "./p1_anim1_frames/p1_anim1_015.png",
  "./p1_anim1_frames/p1_anim1_016.png",
  "./p1_anim1_frames/p1_anim1_017.png",
  "./p1_anim1_frames/p1_anim1_018.png",
  "./p1_anim1_frames/p1_anim1_019.png",
  "./p1_anim1_frames/p1_anim1_020.png",
  "./p1_anim1_frames/p1_anim1_021.png",
  "./p1_anim1_frames/p1_anim1_022.png",
  "./p1_anim1_frames/p1_anim1_023.png",
  "./p1_anim1_frames/p1_anim1_024.png",
  "./p1_anim1_frames/p1_anim1_025.png",
  "./p1_anim1_frames/p1_anim1_026.png",
  "./p1_anim1_frames/p1_anim1_027.png",
  "./p1_anim1_frames/p1_anim1_028.png",
  "./p1_anim1_frames/p1_anim1_029.png",
  "./p1_anim1_frames/p1_anim1_030.png",
  "./p1_anim1_frames/p1_anim1_031.png"
  "./p1_anim1_frames/p1_anim1_032.png"
  "./p1_anim1_frames/p1_anim1_033.png"
  "./p1_anim1_frames/p1_anim1_034.png"
  "./p1_anim1_frames/p1_anim1_035.png"
];

    const textures = framePaths.map(path => loader.load(path));

    const material = new THREE.MeshBasicMaterial({
      map: textures[0],
      transparent: true,
      side: THREE.DoubleSide
    });

    const geometry = new THREE.PlaneGeometry(1, 1);
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(0, 0, 0.01);
    mesh.scale.set(0.7, 0.7, 1);

    anchor0.group.add(mesh);

    let found = false;
    let frameIndex = 0;
    let lastFrameTime = 0;
    const fps = 12;
    const frameDuration = 1000 / fps;

    anchor0.onTargetFound = () => {
      found = true;
      info.textContent = "FOUND poster 1";
    };

    anchor0.onTargetLost = () => {
      found = false;
      info.textContent = "LOST poster 1";
    };

    await mindarThree.start();

    btn.style.display = "none";
    info.textContent = "Running. Point at poster 1.";

    renderer.setAnimationLoop((time) => {
      if (found && time - lastFrameTime > frameDuration) {
        frameIndex = (frameIndex + 1) % textures.length;
        material.map = textures[frameIndex];
        material.needsUpdate = true;
        lastFrameTime = time;
      }
      renderer.render(scene, camera);
    });

  } catch (e) {
    started = false;
    btn.disabled = false;
    btn.textContent = "Start Camera";
    info.textContent =
      "FAILED\n\n" +
      "Name: " + (e?.name || "unknown") + "\n" +
      "Message: " + (e?.message || String(e));
  }
}

btn.addEventListener("touchend", (ev) => {
  ev.preventDefault();
  startAR();
}, { passive:false });

btn.addEventListener("click", (ev) => {
  ev.preventDefault();
  startAR();
});
</script>
</body>
</html>
