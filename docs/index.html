<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tap Debug</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* Make sure canvases/videos cannot steal taps */
canvas, video {
  pointer-events: none !important;
}

/* Full screen background layer */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: #000;
  pointer-events: none; /* ADD THIS */
}

/* Very visible button */
#startButton {
  position: fixed;
  left: 12px;
  right: 12px;
  top: 120px;
  bottom: auto;
  z-index: 2147483647;
  font-size: 22px;
  padding: 22px 16px;
  border: 0;
  border-radius: 14px;
  background: #ffd400;
  color: #000;
  pointer-events: auto !important;
  touch-action: manipulation;
}

/* Status bar */
#info {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 90px;
  padding: 10px 12px;
  color: #fff;
  background: rgba(0,0,0,0.7);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: 13px;
  z-index: 2147483647;
  pointer-events: none;
  white-space: pre-wrap;
}

/* Label */
#ver {
  position: fixed;
  top: 8px;
  right: 8px;
  padding: 6px 8px;
  background: rgba(255,255,0,0.9);
  color: #000;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: 12px;
  z-index: 2147483647;
  pointer-events: none;
}
</style>
</head>

<body>
  <div id="bg"></div>
  <div id="ver">DOCS v7 TAP DEBUG</div>
  <div id="info">Tap the yellow button.
If taps are blocked, I will show the element at your tap position.</div>
  <button id="startButton" type="button">TAP ME</button>

<script>
const info = document.getElementById("info");
const btn = document.getElementById("startButton");

function describeEl(el) {
  if (!el) return "null";
  const id = el.id ? ("#" + el.id) : "";
  const cls = el.className ? ("." + String(el.className).split(" ").join(".")) : "";
  return el.tagName.toLowerCase() + id + cls;
}

function logPoint(x, y, label) {
  const el = document.elementFromPoint(x, y);
  info.textContent =
    label + "\n" +
    "elementFromPoint: " + describeEl(el) + "\n" +
    "x,y: " + Math.round(x) + "," + Math.round(y);
}

document.addEventListener("touchstart", (e) => {
  const t = e.touches[0];
  logPoint(t.clientX, t.clientY, "touchstart on document");
}, { passive: true });

document.addEventListener("click", (e) => {
  logPoint(e.clientX, e.clientY, "click on document");
}, true);

btn.addEventListener("touchstart", (e) => {
  info.textContent = "BUTTON touchstart received. The button is tappable.";
}, { passive: true });

btn.addEventListener("click", (e) => {
  info.textContent = "BUTTON click received. The button is tappable.";
});
</script>
</body>
</html>
