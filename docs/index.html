<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Camera Test</title>
<style>
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
#btn { position:fixed; left:12px; right:12px; bottom:16px; z-index:999999;
  font-size:20px; padding:18px 16px; border:0; border-radius:12px; }
#info { position:fixed; left:0; right:0; bottom:76px; padding:10px 12px;
  color:#fff; background:rgba(0,0,0,0.65);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  z-index:999998; white-space:pre-wrap; }
video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; background:#000; }
</style>
</head>
<body>
  <div id="info">Tap Start Camera. If this fails, MindAR will also fail.</div>
  <button id="btn" type="button">Start Camera</button>
  <video id="v" playsinline muted></video>

<script>
const btn = document.getElementById("btn");
const info = document.getElementById("info");
const v = document.getElementById("v");

async function startCam() {
  btn.disabled = true;
  info.textContent = "Requesting camera permission...";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    v.srcObject = stream;
    await v.play();
    info.textContent = "Camera is running (no AR yet).";
    btn.style.display = "none";
  } catch (e) {
    btn.disabled = false;
    info.textContent =
      "Camera FAILED.\n\n" +
      "Error name: " + (e && e.name ? e.name : "unknown") + "\n" +
      "Error message: " + (e && e.message ? e.message : String(e)) + "\n\n" +
      "Fix: iPhone Settings > Safari > Camera > Allow\n" +
      "Also: AA icon in address bar > Website Settings > Camera > Allow";
  }
}

btn.addEventListener("touchend", (ev) => { ev.preventDefault(); startCam(); }, { passive:false });
btn.addEventListener("click", (ev) => { ev.preventDefault(); startCam(); });
</script>
</body>
</html>
