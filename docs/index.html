<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>Tap Test</title>
  <style>
    html, body { margin:0; height:100%; background:#000; }
    #btn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      padding: 24px 28px;
      z-index: 999999;
      touch-action: manipulation;
    }
    #note {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      color: #fff;
      padding: 12px;
      font-family: sans-serif;
      text-align: center;
      background: rgba(0,0,0,0.6);
      z-index: 999999;
    }
  </style>
</head>
<body>
  <button id="btn" onclick="alert('Button works');">TAP ME</button>
  <div id="note">If you cannot tap this, something is covering the page or Safari is not showing the updated file.</div>
</body>
</html>
