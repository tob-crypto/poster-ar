<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster AR</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

#container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#btn {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  z-index: 2147483647;
  font-size: 20px;
  padding: 18px 16px;
  border: 0;
  border-radius: 12px;
  touch-action: manipulation;
}

#info {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 76px;
  padding: 10px 12px;
  color: #fff;
  background: rgba(0,0,0,0.65);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  z-index: 2147483646;
  white-space: pre-wrap;
}

#ver {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 8px;
  background: rgba(255,255,0,0.9);
  color: #000;
  font-family: sans-serif;
  font-size: 12px;
  z-index: 2147483647;
  pointer-events: none;
}

canvas, video {
  pointer-events: none !important;
}
</style>
</head>

<body>
  <div id="container"></div>
  <div id="ver">WEBP 02</div>
  <div id="info">Tap Start Camera.</div>
  <button id="btn" type="button">Start Camera</button>

<script>
const btn = document.getElementById("btn");
const info = document.getElementById("info");
const container = document.getElementById("container");
let started = false;

async function startAR() {
  if (started) return;
  started = true;

  btn.disabled = true;
  btn.textContent = "Loading...";
  info.textContent = "Loading AR libraries...";

  try {
    const mindarMod = await import("https://esm.sh/mind-ar@1.2.5/dist/mindar-image-three.prod.js?deps=three@0.150.0");
    const THREE = await import("https://esm.sh/three@0.150.0");
    const MindARThree = mindarMod.MindARThree;

    btn.textContent = "Starting...";
    info.textContent = "Requesting camera permission...";

    const mindarThree = new MindARThree({
      container,
      imageTargetSrc: "./targets.mind"
    });

    const { renderer, scene, camera } = mindarThree;
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

    const planeGeo = new THREE.PlaneGeometry(1, 1);

    function addImageToAnchor(anchor, file, x, y, scale) {
      const texture = new THREE.TextureLoader().load(file);

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        side: THREE.DoubleSide
      });

      const mesh = new THREE.Mesh(planeGeo, material);
      mesh.position.set(x, y, 0.01);
      mesh.scale.set(scale, scale, 1);

      anchor.group.add(mesh);
    }

    // Poster 1 = target index 0
    const anchor0 = mindarThree.addAnchor(0);
    addImageToAnchor(anchor0, "p1_anim1.webp", 0, 0, 0.7);

    anchor0.onTargetFound = () => {
      info.textContent = "FOUND poster 1";
    };

    anchor0.onTargetLost = () => {
      info.textContent = "LOST poster 1";
    };

    // Poster 2 = target index 1
    const anchor1 = mindarThree.addAnchor(1);
    addImageToAnchor(anchor1, "p2_anim1.webp", 0, 0, 0.7);

    anchor1.onTargetFound = () => {
      info.textContent = "FOUND poster 2";
    };

    anchor1.onTargetLost = () => {
      info.textContent = "LOST poster 2";
    };

    // Poster 3 = target index 2
    const anchor2 = mindarThree.addAnchor(2);
    addImageToAnchor(anchor2, "p3_anim1.webp", 0, 0, 0.7);

    anchor2.onTargetFound = () => {
      info.textContent = "FOUND poster 3";
    };

    anchor2.onTargetLost = () => {
      info.textContent = "LOST poster 3";
    };

    await mindarThree.start();

    btn.style.display = "none";
    info.textContent = "Running. Point at a poster.";

    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });

  } catch (e) {
    started = false;
    btn.disabled = false;
    btn.textContent = "Start Camera";
    info.textContent =
      "FAILED\n\n" +
      "Name: " + (e?.name || "unknown") + "\n" +
      "Message: " + (e?.message || String(e));
  }
}

btn.addEventListener("touchend", (ev) => {
  ev.preventDefault();
  startAR();
}, { passive:false });

btn.addEventListener("click", (ev) => {
  ev.preventDefault();
  startAR();
});
</script>
</body>
</html>
