<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Camera</title>

<style>
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
#ar { position:fixed; inset:0; z-index:0; }
#btn {
  position:fixed; left:12px; right:12px; bottom:16px;
  z-index:2147483647; font-size:20px; padding:18px 16px;
  border:0; border-radius:12px;
}
#info {
  position:fixed; left:0; right:0; bottom:76px;
  padding:10px 12px; color:#fff; background:rgba(0,0,0,0.6);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  z-index:2147483646;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "./three.module.js",
    "mindar-image-three": "./mindar-image-three.prod.js"
  }
}
</script>
</head>

<body>
  <div id="ar"></div>
  <div id="info">Tap Start. Safari should ask for Camera permission.</div>
  <button id="btn" type="button">Start Camera</button>

<script type="module">
import { MindARThree } from "mindar-image-three";

const btn = document.getElementById("btn");
const info = document.getElementById("info");
const ar = document.getElementById("ar");

let started = false;

async function start() {
  if (started) return;
  started = true;
  btn.disabled = true;
  btn.textContent = "Starting...";
  info.textContent = "Requesting camera permission...";

  const mindarThree = new MindARThree({
    container: ar,
    imageTargetSrc: "./targets.mind",
  });

  try {
    await mindarThree.start(); // this is the moment camera permission appears
  } catch (e) {
    started = false;
    btn.disabled = false;
    btn.textContent = "Start Camera";
    info.textContent = "Camera blocked. iPhone Settings > Safari > Camera > Allow.";
    return;
  }

  btn.style.display = "none";
  info.textContent = "Camera is running.";
}

btn.addEventListener("touchend", (ev) => { ev.preventDefault(); start(); }, { passive:false });
btn.addEventListener("click", (ev) => { ev.preventDefault(); start(); });
</script>
</body>
</html>
