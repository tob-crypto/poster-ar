<!DOCTYPE html>
<html>
<head>
<script type="importmap">
{
  "imports": {
    "three": "./three.module.js",
    "mindar-image-three": "./mindar-image-three.prod.js"
  }
}
</script>
  
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poster AR</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* AR container stays behind everything */
#ar-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Guarantee nothing steals taps */
canvas, video {
  pointer-events: none !important;
}

/* Very safe, always-on-top button */
#startButton {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 16px;
  z-index: 2147483647;
  font-size: 20px;
  padding: 18px 16px;
  border: 0;
  border-radius: 12px;
  pointer-events: auto;
  touch-action: manipulation;
}

/* Status text */
#info {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 76px;
  padding: 10px 12px;
  color: #fff;
  background: rgba(0,0,0,0.65);
  text-align: center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: 14px;
  z-index: 2147483646;
  pointer-events: none;
}

/* Version label */
#ver {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 6px 8px;
  background: rgba(255,255,0,0.9);
  color: #000;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: 12px;
  z-index: 2147483647;
  pointer-events: none;
}
</style>
</head>

<body>
  <div id="ar-container"></div>

  <div id="ver">AR DOCS v10</div>
  <div id="info">Tap Start Camera. Safari should ask for Camera permission.</div>
  <button id="startButton" type="button">Start Camera</button>

<script type="module">
const arContainer = document.getElementById("ar-container");
const startButton = document.getElementById("startButton");
const info = document.getElementById("info");

const PLACEMENTS = {
  0: [
    { x: -0.30, y:  0.25, scale: 0.55, file: "p1_anim1.webm" },
    { x:  0.30, y:  0.20, scale: 0.55, file: "p1_anim2.webm" },
    { x:  0.00, y: -0.30, scale: 0.70, file: "p1_anim3.webm" },
  ],
  1: [
    { x: -0.30, y:  0.25, scale: 0.55, file: "p2_anim1.webm" },
    { x:  0.30, y:  0.20, scale: 0.55, file: "p2_anim2.webm" },
    { x:  0.00, y: -0.30, scale: 0.70, file: "p2_anim3.webm" },
  ],
  2: [
    { x: -0.30, y:  0.25, scale: 0.55, file: "p3_anim1.webm" },
    { x:  0.30, y:  0.20, scale: 0.55, file: "p3_anim2.webm" },
    { x:  0.00, y: -0.30, scale: 0.70, file: "p3_anim3.webm" },
  ],
};

function makeVideo(src) {
  const v = document.createElement("video");
  v.src = src;
  v.loop = true;
  v.muted = true;
  v.preload = "auto";
  v.playsInline = true;
  v.setAttribute("playsinline", "");
  v.setAttribute("webkit-playsinline", "");
  v.setAttribute("muted", "");
  return v;
}

let started = false;

async function startAR() {
  if (started) return;
  started = true;

  startButton.disabled = true;
  startButton.textContent = "Loading AR...";
  info.textContent = "Loading libraries...";

  // Load libraries only after the user taps
  let THREE, MindARThree;
  try {
    const threeMod = await import("three");
    THREE = threeMod;

    const mindarMod = await import("mindar-image-three");
    MindARThree = mindarMod.MindARThree;
  } catch (e) {
    started = false;
    startButton.disabled = false;
    startButton.textContent = "Start Camera";
    info.textContent = "Failed to load AR libraries. Check three.module.js and mindar-image-three.prod.js are reachable.";
    return;
  }

  info.textContent = "Requesting camera permission...";

  const mindarThree = new MindARThree({
    container: arContainer,
    imageTargetSrc: "./targets.mind",
  });

  const { renderer, scene, camera } = mindarThree;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

  const plane = new THREE.PlaneGeometry(1, 1);
  const anchors = [
    mindarThree.addAnchor(0),
    mindarThree.addAnchor(1),
    mindarThree.addAnchor(2),
  ];

  const videosByTarget = { 0: [], 1: [], 2: [] };

  for (const targetIndex of [0, 1, 2]) {
    const anchor = anchors[targetIndex];

    for (const item of PLACEMENTS[targetIndex]) {
      const video = makeVideo(item.file);
      videosByTarget[targetIndex].push(video);

      const texture = new THREE.VideoTexture(video);
      texture.generateMipmaps = false;
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;

      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(plane, material);
      mesh.position.set(item.x, item.y, 0.01);
      mesh.scale.set(item.scale, item.scale, 1);
      anchor.group.add(mesh);
    }

    anchor.onTargetFound = () => {
      info.textContent = `Poster ${targetIndex + 1} detected`;
      for (const v of videosByTarget[targetIndex]) v.play().catch(() => {});
    };

    anchor.onTargetLost = () => {
      info.textContent = "Point at a poster";
      for (const v of videosByTarget[targetIndex]) v.pause();
    };
  }

  try {
    await mindarThree.start();
  } catch (e) {
    started = false;
    startButton.disabled = false;
    startButton.textContent = "Start Camera";
    info.textContent = "Camera blocked. iPhone Settings > Safari > Camera > Allow.";
    return;
  }

  startButton.style.display = "none";
  info.textContent = "Camera started. Point at a poster.";
  renderer.setAnimationLoop(() => renderer.render(scene, camera));
}

// iPhone Safari: prioritize touch
startButton.addEventListener("touchend", (ev) => {
  ev.preventDefault();
  startAR();
}, { passive: false });

startButton.addEventListener("click", (ev) => {
  ev.preventDefault();
  startAR();
});
</script>
</body>
</html>
